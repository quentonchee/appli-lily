<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Lily - De la part de la Famille ! 🎈</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Styles spécifiques pour le cadeau surprise wiggling et son texte */
        #surprise-gift-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            text-align: center;
        }

        #surprise-gift-container.active {
            display: flex;
        }

        #surprise-gift {
            font-size: 6rem;
            cursor: pointer;
            animation: wiggle 1.2s infinite ease-in-out;
            filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.4));
            user-select: none;
            transition: transform 0.2s ease;
        }

        #surprise-gift:hover {
            transform: scale(1.25);
        }

        #surprise-gift-text {
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            margin-top: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            background: rgba(157, 78, 221, 0.85);
            /* Purple primary matching our palette */
            padding: 8px 20px;
            border-radius: 20px;
            pointer-events: none;
            animation: pulse 1.5s infinite alternate ease-in-out;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.9;
            }

            100% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            15% {
                transform: rotate(-15deg) scale(1.1);
            }

            30% {
                transform: rotate(10deg) scale(1.1);
            }

            45% {
                transform: rotate(-10deg) scale(1.1);
            }

            60% {
                transform: rotate(5deg) scale(1.1);
            }

            75% {
                transform: rotate(-5deg) scale(1.1);
            }
        }
    </style>
</head>

<body>
    <!-- Canvas pour l'animation festive de confettis -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Écran d'accueil interactif (Hero) -->
    <header class="hero">
        <div class="hero-content">
            <div class="gift-icon-wrapper">
                <svg class="gift-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 12V20C20 20.5523 19.5523 21 19 21H5C4.44772 21 4 20.5523 4 20V12" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" />
                    <path d="M22 7H2V12H22V7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                    <path d="M12 21V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path
                        d="M12 7C12 7 9.5 3 6.5 3C4 3 3 5 3 6.5C3 9 7 12 12 12C17 12 21 9 21 6.5C21 5 20 3 17.5 3C14.5 3 12 7 12 7Z"
                        stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                </svg>
            </div>
            <h1 class="hero-title">Joyeux Anniversaire <span class="highlight">Lily</span> !</h1>
            <p class="hero-subtitle">La Famille Banane te réserve une surprise magique. Clique ci-dessous pour la
                découvrir...</p>
            <button id="btn-explore" class="btn btn-primary">
                Découvrir la surprise
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z"
                        stroke="currentColor" stroke-width="2" />
                    <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Modal d'affichage de la vidéo (Immersive) -->
    <div id="video-modal" class="modal-overlay hidden">
        <div class="modal-container glass">
            <button id="modal-close" class="modal-close-btn" aria-label="Fermer la modale">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>

            <div class="modal-content-layout">
                <!-- Lecteur Vidéo HTML5 Personnalisé -->
                <div class="modal-video-column">
                    <div class="custom-video-player">
                        <!-- Titre flottant du participant -->
                        <div class="video-overlay-title">
                            <span id="modal-participant-name">Famille</span>
                        </div>
                        <video id="modal-video-element" playsinline></video>
                        <div id="surprise-gift-container">
                            <div id="surprise-gift" aria-label="Cadeau surprise">🎁</div>
                            <div id="surprise-gift-text">Clique sur le cadeau !</div>
                        </div>
                        <div class="video-loader" id="video-loader">
                            <div class="spinner"></div>
                        </div>
                        <!-- Contrôles personnalisés du lecteur vidéo -->
                        <div class="custom-video-controls">
                            <button id="video-btn-play" class="control-btn" aria-label="Lire/Pause">
                                <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5V19L19 12L8 5Z" />
                                </svg>
                                <svg id="icon-pause" class="hidden" width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path d="M6 19H10V5H6V19ZM14 5V19H18V5H14Z" />
                                </svg>
                            </button>
                            <div class="video-progress-container" id="video-progress-bar">
                                <div class="video-progress-filled" id="video-progress-filled"></div>
                            </div>
                            <span class="video-time" id="video-time">0:00 / 0:00</span>
                            <button id="video-btn-mute" class="control-btn" aria-label="Activer/Couper le son">
                                <svg id="icon-unmute" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M3 9V15H7L12 20V4L7 9H3ZM16.5 12C16.5 10.23 15.48 8.71 14 8V16C15.48 15.29 16.5 13.77 16.5 12ZM14 3.23V5.29C16.89 6.15 19 8.83 19 12C19 15.17 16.89 17.85 14 18.71V20.77C18.01 19.86 21 16.28 21 12C21 7.72 18.01 4.14 14 3.23Z" />
                                </svg>
                                <svg id="icon-mute" class="hidden" width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path
                                        d="M16.5 12C16.5 10.23 15.48 8.71 14 8V10.26L16.29 12.55C16.43 12.37 16.5 12.19 16.5 12ZM19 12C19 12.87 18.84 13.71 18.54 14.49L20.08 16.03C20.67 14.83 21 13.46 21 12C21 7.72 18.01 4.14 14 3.23V5.29C16.89 6.15 19 8.83 19 12ZM4.27 3L3 4.27L7.73 9H3V15H7L12 20V13.27L16.25 17.52C15.58 18.04 14.83 18.45 14 18.7V20.76C15.38 20.48 16.63 19.82 17.68 18.96L19.73 21L21 19.73L12 10.73L4.27 3ZM12 4L9.91 6.09L12 8.18V4Z" />
                                </svg>
                            </button>
                            <!-- Bouton Télécharger -->
                            <a id="video-btn-download" class="control-btn" download aria-label="Télécharger la vidéo">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M12 15V3M12 15L8 11M12 15L16 11M2 17V19C2 20.1046 2.89543 21 4 21H20C21.1046 21 22 20.1046 22 19V17"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="main-footer">
        <p>© 2026 - L'album à souvenirs de Lily. Joyeux Anniversaire ! 🎉</p>
    </footer>

    <!-- Injecter la variable globale du participant actuel -->
    <script>
        window.CURRENT_PARTICIPANT = {
            id: "famille",
            name: "Famille",
            videoUrl: "../assets/famille/familllle.mov"
        };
    </script>
    <script src="../app.js"></script>
    <script>
        // Logique spécifique pour la surprise de la Famille Banane
        document.addEventListener("DOMContentLoaded", () => {
            const videoEl = document.getElementById("modal-video-element");
            const giftContainer = document.getElementById("surprise-gift-container");
            let isSurprisePlaying = false;

            if (videoEl && giftContainer) {
                // Événement fin de vidéo
                videoEl.addEventListener("ended", () => {
                    if (!isSurprisePlaying) {
                        giftContainer.classList.add("active");
                    }
                });

                // Événement chargement de vidéo pour réinitialisation
                videoEl.addEventListener("loadstart", () => {
                    if (videoEl.src.includes("familllle.mov")) {
                        isSurprisePlaying = false;
                        giftContainer.classList.remove("active");

                        const nameEl = document.getElementById("modal-participant-name");
                        if (nameEl) nameEl.innerText = "Famille";
                    }
                });

                // Clic sur l'emoji cadeau ou son conteneur
                giftContainer.addEventListener("click", (e) => {
                    e.stopPropagation(); // Évite les conflits de clics avec le player
                    giftContainer.classList.remove("active");
                    isSurprisePlaying = true;

                    // Mettre à jour la source vers la vidéo surprise
                    videoEl.src = "../assets/famille/nicolas-adelie-leo.mp4";

                    // Mettre à jour le titre du participant dans la modale
                    const nameEl = document.getElementById("modal-participant-name");
                    if (nameEl) nameEl.innerText = "Nicolas, Adélie & Léo";

                    // Mettre à jour le bouton de téléchargement
                    const downloadBtn = document.getElementById("video-btn-download");
                    if (downloadBtn) {
                        downloadBtn.href = "../assets/famille/nicolas:adelie:léo.mp4";
                        downloadBtn.download = "Nicolas_Adelie_Leo.mp4";
                    }

                    videoEl.load();
                    videoEl.play().then(() => {
                        const iconPlay = document.getElementById("icon-play");
                        const iconPause = document.getElementById("icon-pause");
                        if (iconPlay && iconPause) {
                            iconPlay.classList.add("hidden");
                            iconPause.classList.remove("hidden");
                        }
                    }).catch(err => {
                        console.error("Erreur de lecture de la surprise :", err);
                    });
                });
            }
        });
    </script>
</body>

</html>
